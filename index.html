<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Handwriting</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #071c2f, #02101c);
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 420px;
      margin: auto;
    }

    h1 {
      color: #f7b500;
      font-size: 28px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .subtitle {
      color: #00e6a8;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    /* Profile Image Glow */
    .profile-box {
      margin: 30px 0;
      position: relative;
    }

    .glow {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,193,7,0.5) 0%, transparent 70%);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      filter: blur(20px);
    }

    .profile-box img {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #111;
      position: relative;
      z-index: 1;
    }

    /* Button */
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 16px 30px;
      border-radius: 40px;
      font-size: 18px;
      font-weight: 600;
      color: white;
      text-decoration: none;
      background: linear-gradient(90deg, #ff3c3c, #00d084);
      transition: 0.3s;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .btn:hover {
      transform: scale(1.05);
    }

    /* Features */
    .features {
      margin-top: 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .card {
      border: 1px solid #d4af37;
      border-radius: 15px;
      padding: 18px;
      font-size: 16px;
      background: rgba(255,255,255,0.03);
      transition: 0.3s;
    }

    .card:hover {
      background: rgba(255,255,255,0.08);
      transform: translateY(-5px);
    }

    .icon {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .footer {
      margin-top: 30px;
      font-size: 14px;
      color: #ccc;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>TIME BOOK PUBLICATION</h1>

    <p class="subtitle">
      WRITING WORK JOB FROM HOME AVAILABLE NOW <br>
      ▶▶ Anyone who wants to work from home, message me guys <br>
      100% Trusted Work $
    </p>

    <div class="profile-box">
      <div class="glow"></div>
      <img src="IMG_20260408_130156_100.jpg" alt="Profile">
    </div>

    <!-- BUTTON -->
    <a href="https://t.me/+XOfZegvSih1lYTE1" class="btn">
      Join Free Telegram
    </a>

    <!-- FEATURES -->
    <div class="features">
      <div class="card">
        <div class="icon">⚡</div>
        Daily Earning
      </div>

      <div class="card">
        <div class="icon">📊</div>
        Work From Home
      </div>

      <div class="card">
        <div class="icon">♻️</div>
        Flexible Time
      </div>

      <div class="card">
        <div class="icon">✅</div>
        Official Channel
      </div>
    </div>

    <div class="footer">
      ENGLISH HANDWRITING
    </div>

  </div>

</body>
</html>
