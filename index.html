  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #0a0a0a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 30px 25px;
      border-radius: 22px;
      background: linear-gradient(145deg, #111, #0a0a0a);
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      text-align: center;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .badge {
      display: inline-block;
      background: rgba(0,255,170,0.1);
      color: #00ffaa;
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 12px;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 25px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .desc {
      font-size: 14px;
      color: #bfbfbf;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .profile {
      width: 140px;
      height: 140px;
      margin: 0 auto 25px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid rgba(255,255,255,0.15);
      box-shadow: 0 0 40px rgba(0,255,170,0.25);
    }

    .profile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cta {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      font-size: 17px;
      color: #000;
      background: #00ffaa;
      margin-bottom: 20px;
      letter-spacing: 0.3px;
      box-shadow: 0 10px 30px rgba(0,255,170,0.35);
      transition: all 0.25s ease;
    }

    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(0,255,170,0.6);
      background: #00e699;
    }

    .features {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-radius: 12px;
      background: #121212;
      border: 1px solid rgba(255,255,255,0.05);
      transition: 0.3s;
    }

    .feature:hover {
      background: #181818;
    }

    .icon {
      font-size: 18px;
    }

    .footer {
      margin-top: 22px;
      font-size: 13px;
      color: #888;
    }

  </style>
</head>

<body>

  <div class="card">

    <div class="badge">100% Trusted Work</div>

    <h1>TIME BOOK PUBLICATION</h1>

    <p class="desc">
      Writing work from home available now.<br>
      Anyone can start easily and earn daily income.<br>
      No experience required.
    </p>

    <div class="profile">
      <img src="IMG_20260408_130156_100.jpg" alt="Profile">
    </div>

    <a href="https://t.me/+XOfZegvSih1lYTE1" class="cta">
      Join Free Telegram
    </a>

    <div class="features">
      <div class="feature">
        <div class="icon">⚡</div>
        <div>Daily Earning Opportunity</div>
      </div>

      <div class="feature">
        <div class="icon">🏠</div>
        <div>Work From Home</div>
      </div>

      <div class="feature">
        <div class="icon">⏱️</div>
        <div>Flexible Time</div>
      </div>

      <div class="feature">
        <div class="icon">✔️</div>
        <div>Official Telegram Channel</div>
      </div>
    </div>

    <div class="footer">
      ENGLISH HANDWRITING
    </div>

  </div>

</body>
</html>
